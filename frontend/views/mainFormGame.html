<section id="main-modified-section">
    <div id="modified-card" class="form-card">
        <form id="game-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="name-input">Nome del gioco:</label>
                    <input type="text" id="name-input" name="name" required>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="game-players-input">Numero di giocatori:</label>
                    <div class="input-group">
                        <input type="number" id="min-players-input" name="min-players" min="1" placeholder="minimo" required>
                        <span> - </span>
                        <input type="number" id="max-players-input" name="max-players" min="1" placeholder="massimo" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="time-input">Durata (minuti):</label>
                    <input type="number" id="time-input" name="time" min="1" required>
                </div>
                <div class="form-group">
                    <label for="age-input">Età minima:</label>
                    <input type="number" id="age-input" name="age" min="1" required>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="year-input">Anno di pubblicazione:</label>
                    <input type="number" id="year-input" name="year" min="1900" required>
                </div>
                <div class="form-group">
                    <label for="location-input">Posizione:</label>
                    <input type="text" id="location-input" name="location" placeholder="piano.scaffale.mensola">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="small-image-input">Link immagine di copertina</label>
                    <input type="url" id="small-image-input" name="game-image-small">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="big-image-input">Link immagine di dettaglio</label>
                    <input type="url" id="big-image-input" name="big-image">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="description-input">Descrizione:</label>
                    <textarea id="description-input" name="description"></textarea>
                </div>
            </div>

            <div class = "form-button-row">
                <button id="navigate-back-btn" class="secondaryButton">Annulla</button>
                <button id="save-game-btn" type="submit" class="primaryButton">Salva</button>
            </div>
        </form>
    </div>
</section>
