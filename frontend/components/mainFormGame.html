<section id="main-modified-section">
    <div id="modified-card" class="form-card">
        <form id="game-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="name">Nome del gioco:</label>
                    <input type="text" id="name" name="name" required>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="game-players-input">Numero di giocatori:</label>
                    <div class="input-group">
                        <input type="number" id="min-players" name="min-players" min="1" placeholder="minimo" required>
                        <span> - </span>
                        <input type="number" id="max-players" name="max-players" min="1" placeholder="massimo" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="time">Durata (minuti):</label>
                    <input type="number" id="time" name="time" min="1" required>
                </div>
                <div class="form-group">
                    <label for="age">Età minima:</label>
                    <input type="number" id="age" name="age" min="1" required>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="year">Anno di pubblicazione:</label>
                    <input type="number" id="year" name="year" min="1900" required>
                </div>
                <div class="form-group">
                    <label for="location">Posizione:</label>
                    <input type="text" id="location" name="location" placeholder="piano.scaffale.mensola">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="small-image">Link immagine di copertina</label>
                    <input type="url" id="small-image" name="game-image-small">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="big-image">Link immagine di dettaglio</label>
                    <input type="url" id="big-image" name="big-image">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="description">Descrizione:</label>
                    <textarea id="description" name="description"></textarea>
                </div>
            </div>

            <div class = "form-button-row">
                <button id="navigate-back-btn" class="secondaryButton">Annulla</button>
                <button id="save-game-btn" type="submit" class="primaryButton">Salva</button>
            </div>
        </form>
    </div>
</section>
