<!DOCTYPE html>
<html lang="it">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta charset="UTF-8">

        <title>Board Games Library</title>
        <link rel="icon" type="image/x-icon" href="./IMG/logo.png">

        <link rel="stylesheet" href="./css/tailwindStyle.css">
        <script type="module" src="./JS/client.js"></script>
        <script defer src="./JS/loadComponent.js"></script>
    </head>
    <body>
        <div id="navbar-placeholder"></div>
        <div id="title-section">
            <h1>La tua collezione di giochi da tavolo!</h1>
            <p>Esplora, filtra e gestisci la tua libreria in modo facile e veloce.</p>
        </div>
        <div id="content-title-section">
            <h2> Tutti i giochi : </h2>
        </div>
        <main id="main-section">
            <div id="main-home">
                <p> Qui ci vanno i giochi</p>
            </div>
            <div id = "main-right-section">
                <div id = "game-details" class="main-right-container">
                    <p>	&#x1F465; Giochi totali: <span id="total-games">0</span></p>
                </div>
                <div id="quick-filter" class="main-right-container">
                    <h2>Filtri rapidi</h2>
                    <div id="quick-filter-grid">
                        <button class="quickFilterButton" id="filter-15minutes">15 minuti</button>
                        <button class="quickFilterButton" id="filter-30minutes">30 minuti</button>
                        <button class="quickFilterButton" id="filter-2Player">2 giocatori</button>
                        <button class="quickFilterButton" id="filter-4Player">4 giocatori</button>
                        <button class="quickFilterButton" id="filter-5years">+ 5 anni</button>
                        <button class="quickFilterButton" id="filter-10years">+ 10 anni</button>
                    </div>
                </div>
                <div id = "navigationButtons" class="main-right-container">
                    <button class="allGameButton">
                        Tutti i giochi
                    </button>
                </div>
            </div>
        </main>
        <footer id="footer-placeholder"></footer>
    </body>
</html>
