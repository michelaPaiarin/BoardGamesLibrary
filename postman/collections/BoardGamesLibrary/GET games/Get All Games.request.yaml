$kind: http-request
method: GET
url: 'http://localhost:3000/games'
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Response is a JSON array", function () {
        const json = pm.response.json();
        pm.expect(json).to.be.an('array');
      });

      pm.test("Each item has required fields", function () {
        const json = pm.response.json();
        if (json.length > 0) {
          json.forEach(function (item) {
            pm.expect(item).to.have.property('Name');
            pm.expect(item).to.have.property('MinPlayer');
            pm.expect(item).to.have.property('MaxPlayer');
            pm.expect(item).to.have.property('MinAge');
            pm.expect(item).to.have.property('Time');
            pm.expect(item).to.have.property('Location');
          });
        }
      });
