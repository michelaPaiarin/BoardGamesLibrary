$kind: http-request
method: POST
url: 'http://localhost:3000/games'
order: 6000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "Name": "Bad Image Game",
      "MinPlayer": 2,
      "MaxPlayer": 4,
      "MinAge": 8,
      "Time": 60,
      "Location": "A.1.3",
      "UrlBigImage": "ftp://invalid.com/image.jpg"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 400", function () {
        pm.response.to.have.status(400);
      });

      pm.test("Response has field 'details'", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property('details');
      });
