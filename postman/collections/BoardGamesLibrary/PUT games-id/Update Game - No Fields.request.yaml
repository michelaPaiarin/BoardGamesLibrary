$kind: http-request
method: PUT
url: 'http://localhost:3000/games/{{createdGameId}}'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {}
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 400", function () {
        pm.response.to.have.status(400);
      });

      pm.test("Response has field 'message'", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property('message');
      });
