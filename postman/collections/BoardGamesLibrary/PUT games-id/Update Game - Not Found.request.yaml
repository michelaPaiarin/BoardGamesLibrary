$kind: http-request
method: PUT
url: 'http://localhost:3000/games/999999'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "Time": 45
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 404", function () {
        pm.response.to.have.status(404);
      });

      pm.test("Response has field 'message'", function () {
        const json = pm.response.json();
        pm.expect(json).to.have.property('message');
      });
